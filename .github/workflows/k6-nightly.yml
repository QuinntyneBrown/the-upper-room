# traces_to: L2-091
name: k6 Load Tests (Nightly)

on:
  schedule:
    - cron: '0 2 * * *'  # 2:00 AM UTC daily
  workflow_dispatch:

jobs:
  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start backend
        run: |
          cd backend
          dotnet run --project src/TheUpperRoom.Api &
          sleep 10

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run contacts-list load test
        run: k6 run k6/contacts-list.js
        env:
          BASE_URL: http://localhost:5000
          TEST_USER_ID: lead

      - name: Run partners-list load test
        run: k6 run k6/partners-list.js
        env:
          BASE_URL: http://localhost:5000
          TEST_USER_ID: lead

      - name: Run dashboard load test
        run: k6 run k6/dashboard.js
        env:
          BASE_URL: http://localhost:5000
          TEST_USER_ID: lead
