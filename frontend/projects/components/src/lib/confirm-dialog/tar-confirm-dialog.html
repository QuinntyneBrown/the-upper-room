<h2
  mat-dialog-title
  id="confirm-dialog-title"
  data-testid="confirm-title"
  class="tar-confirm-dialog__title"
>{{ data.title }}</h2>
<mat-dialog-content class="tar-confirm-dialog__content">
  @if (data.body) {
    <p data-testid="confirm-body" class="tar-confirm-dialog__body">{{ data.body }}</p>
  }
  @if (data.requireTypedConfirmation; as phrase) {
    <mat-form-field appearance="outline" class="tar-confirm-dialog__field">
      <input
        matInput
        data-testid="confirm-typed-input"
        type="text"
        [placeholder]="'Type ' + phrase + ' to confirm'"
        [value]="typed()"
        (input)="typed.set($any($event.target).value)"
      />
    </mat-form-field>
  }
</mat-dialog-content>
<mat-dialog-actions align="end" class="tar-confirm-dialog__actions">
  <button
    mat-button
    data-testid="confirm-cancel"
    type="button"
    (click)="cancel()"
  >{{ data.cancelLabel ?? 'Cancel' }}</button>
  <button
    mat-flat-button
    data-testid="confirm-button"
    type="button"
    [disabled]="!confirmEnabled()"
    (click)="confirm()"
  >{{ data.confirmLabel ?? 'Confirm' }}</button>
</mat-dialog-actions>
