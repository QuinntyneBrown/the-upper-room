@if (open) {
  <div
    class="tar-dialog__backdrop"
    [attr.data-testid]="testId ? testId + '-backdrop' : null"
    (click)="closeOnBackdrop && closed.emit()"
  ></div>
  <mat-card
    appearance="filled"
    class="tar-dialog"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="ariaLabel || title"
    [attr.data-testid]="testId"
    (click)="$event.stopPropagation()"
  >
    @if (title || subtitle) {
      <header class="tar-dialog__header">
        @if (title) {
          <h2 class="tar-dialog__title">{{ title }}</h2>
        }
        @if (subtitle) {
          <p class="tar-dialog__subtitle">{{ subtitle }}</p>
        }
      </header>
    }
    <div class="tar-dialog__body">
      <ng-content />
    </div>
    @if (showActions) {
      <footer class="tar-dialog__actions">
        <ng-content select="[tar-dialog-actions]" />
      </footer>
    }
  </mat-card>
}
