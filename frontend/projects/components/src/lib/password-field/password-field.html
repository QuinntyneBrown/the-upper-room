<mat-form-field
  class="tar-password-field"
  [class.tar-password-field--full-width]="fullWidth()"
  appearance="outline"
  subscriptSizing="dynamic"
>
  @if (label()) {
    <mat-label>{{ label() }}</mat-label>
  }
  <input
    matInput
    class="tar-password-field__input"
    [type]="visible() ? 'text' : 'password'"
    [value]="value()"
    [placeholder]="placeholder()"
    [required]="required()"
    [disabled]="disabled()"
    [attr.autocomplete]="autocomplete()"
    [attr.maxlength]="maxLength()"
    [attr.data-testid]="testId()"
    [attr.aria-label]="ariaLabel() || label()"
    (input)="onInput($event)"
    (blur)="blurred.emit()"
  />
  <button
    mat-icon-button
    matIconSuffix
    type="button"
    class="tar-password-field__toggle"
    [attr.aria-label]="visible() ? 'Hide password' : 'Show password'"
    [attr.data-testid]="toggleTestId() ?? (testId() ? testId() + '-toggle' : null)"
    (click)="toggle()"
  >
    <mat-icon>{{ visible() ? 'visibility_off' : 'visibility' }}</mat-icon>
  </button>
  @if (hint()) {
    <mat-hint class="tar-password-field__hint">{{ hint() }}</mat-hint>
  }
</mat-form-field>
@if (error()) {
  <span
    class="tar-password-field__error"
    role="alert"
    [attr.data-testid]="errorTestId() ?? (testId() ? testId() + '-error' : null)"
  >{{ error() }}</span>
}
