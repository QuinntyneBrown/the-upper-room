<div class="tar-password-strength__bars" role="presentation">
  @for (i of barIndices; track i) {
    <span
      data-testid="password-strength-bar"
      class="tar-password-strength__bar"
      [class.tar-password-strength__bar--filled]="i < eval().score"
      [style.background]="i < eval().score ? barColor() : 'transparent'"
    ></span>
  }
</div>
<span
  data-testid="password-strength-label"
  class="tar-password-strength__label"
  [style.color]="labelColor()"
>
  {{ label() }}
</span>
@if (eval().helper; as msg) {
  <span data-testid="password-strength-helper" class="tar-password-strength__helper">{{ msg }}</span>
}
