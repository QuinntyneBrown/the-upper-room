<div class="notification-bell">
  <div class="notification-bell__btn-wrapper">
    <tar-icon-button
      testId="notification-bell"
      icon="notifications"
      ariaLabel="Notifications"
      (clicked)="toggleMenu()"
    />
    @if (unreadCount() > 0) {
      <span data-testid="notification-badge" class="notification-bell__badge">{{ badgeLabel() }}</span>
    }
  </div>

  @if (open()) {
    <div data-testid="notification-menu" class="notification-bell__menu" role="dialog" aria-label="Notifications">
      <header class="notification-bell__menu-header">
        <h2 class="notification-bell__menu-title">Notifications</h2>
      </header>

      <div class="notification-bell__tabs" role="tablist">
        <button
          mat-button
          data-testid="notification-tab-unread"
          type="button"
          class="notification-bell__tab"
          [class.notification-bell__tab--active]="activeTab() === 'unread'"
          role="tab"
          [attr.aria-selected]="activeTab() === 'unread'"
          (click)="setTab('unread')"
        >Unread</button>
        <button
          mat-button
          data-testid="notification-tab-all"
          type="button"
          class="notification-bell__tab"
          [class.notification-bell__tab--active]="activeTab() === 'all'"
          role="tab"
          [attr.aria-selected]="activeTab() === 'all'"
          (click)="setTab('all')"
        >All</button>
      </div>

      <div class="notification-bell__list" role="tabpanel">
        @if (visibleRows().length === 0) {
          <div data-testid="notification-empty" class="notification-bell__empty">
            <mat-icon class="notification-bell__empty-icon">notifications_off</mat-icon>
            <p>You're all caught up</p>
          </div>
        } @else {
          @for (n of visibleRows(); track n.id) {
            <button
              mat-button
              data-testid="notification-row"
              type="button"
              class="notification-bell__row"
              [class.notification-bell__row--unread]="!n.read"
              (click)="onRowClick(n)"
            >
              <mat-icon class="notification-bell__row-icon notification-bell__row-icon--{{ n.severity | lowercase }}">
                {{ n.severity === 'Warning' ? 'warning' : n.severity === 'Success' ? 'check_circle' : 'info' }}
              </mat-icon>
              <div class="notification-bell__row-content">
                <span class="notification-bell__row-title">{{ n.title }}</span>
                <span class="notification-bell__row-body">{{ n.body }}</span>
                <span class="notification-bell__row-time">{{ n.createdAt | date:'shortTime' }}</span>
              </div>
            </button>
          }
        }
      </div>

      <footer class="notification-bell__menu-footer">
        <tar-button variant="text" testId="notification-mark-all-read" type="button" (clicked)="markAllRead()">Mark all as read</tar-button>
        <a
          data-testid="notification-settings-link"
          class="notification-bell__footer-link"
          routerLink="/settings/notifications"
        >Notification settings</a>
      </footer>
    </div>
  }
</div>
