<h1>Notification Preferences</h1>

<div class="np__push-section">
  @if (!pushSubscribed()) {
    <tar-button variant="outlined" testId="push-enable-button" type="button" (clicked)="enablePush()">Enable push notifications</tar-button>
  } @else {
    <tar-button variant="outlined" testId="push-disable-button" type="button" (clicked)="disablePush()">Disable push notifications</tar-button>
  }
</div>

<section class="np__digest-section">
  <label for="digest-frequency-select" class="np__digest-label">Email digest frequency</label>
  <select
    id="digest-frequency-select"
    data-testid="digest-frequency-select"
    class="np__digest-select"
    [value]="digestFrequency()"
    (change)="onDigestChange($any($event.target).value)"
  >
    @for (opt of digestOptions; track opt) {
      <option [value]="opt">{{ opt }}</option>
    }
  </select>
  @if (digestSaved()) {
    <span data-testid="digest-saved" class="np__saved">Saved</span>
  }
</section>

<table mat-table [dataSource]="prefs()" class="np__table">
  <ng-container matColumnDef="notification">
    <th mat-header-cell *matHeaderCellDef>Notification</th>
    <td mat-cell *matCellDef="let pref" class="np__code">{{ pref.code }}</td>
  </ng-container>
  <ng-container matColumnDef="inApp">
    <th mat-header-cell *matHeaderCellDef>In-app</th>
    <td mat-cell *matCellDef="let pref">
      <tar-checkbox
        testId="pref-toggle-inApp"
        [checked]="pref.inApp"
        (checkedChange)="onToggle(pref.code, 'inApp')"
      />
    </td>
  </ng-container>
  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef="let pref">
      <tar-checkbox
        testId="pref-toggle-email"
        [checked]="pref.email"
        (checkedChange)="onToggle(pref.code, 'email')"
      />
    </td>
  </ng-container>
  <ng-container matColumnDef="push">
    <th mat-header-cell *matHeaderCellDef>Push</th>
    <td mat-cell *matCellDef="let pref">
      <tar-checkbox
        testId="pref-toggle-push"
        [checked]="pref.push"
        (checkedChange)="onToggle(pref.code, 'push')"
      />
    </td>
  </ng-container>
  <ng-container matColumnDef="saved">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let pref">
      @if (savedCode() === pref.code) {
        <span data-testid="pref-saved" class="np__saved">Saved</span>
      }
    </td>
  </ng-container>
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;" [attr.data-testid]="'pref-row-' + row.code"></tr>
</table>
