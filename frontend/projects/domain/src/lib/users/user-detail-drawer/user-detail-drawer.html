@let u = _user();

@if (u) {
  <div class="backdrop" (click)="closed.emit()"></div>
  <aside data-testid="user-drawer" class="drawer" role="dialog" aria-label="User detail">
    <header class="drawer__header">
      <div class="avatar"></div>
      <div>
        <h2 data-testid="user-drawer-name">{{ u.name }}</h2>
        <p>{{ u.email }}</p>
      </div>
      <tar-icon-button
        testId="user-drawer-close"
        icon="close"
        ariaLabel="Close"
        (clicked)="closed.emit()"
      />
    </header>

    <dl class="meta">
      <div>
        <dt>Status</dt>
        <dd data-testid="user-drawer-status">{{ u.status }}</dd>
      </div>
      <div>
        <dt>Role</dt>
        <dd>
          <tar-select
            testId="user-drawer-role-select"
            [value]="u.role"
            [options]="roleOptions"
            (valueChange)="onRole($event)"
          />
        </dd>
      </div>
      <div>
        <dt>City</dt>
        <dd>{{ u.city }}</dd>
      </div>
      <div>
        <dt>Last sign-in</dt>
        <dd>{{ u.lastSignIn }}</dd>
      </div>
    </dl>

    <div class="actions">
      <tar-button variant="outlined" testId="user-drawer-reset-password" type="button" (clicked)="resetPasswordRequested.emit(u)">
        Reset password
      </tar-button>
      @if (!isSelf()) {
        <tar-button variant="outlined" testId="user-drawer-disable" type="button" (clicked)="disableRequested.emit(u)">
          Disable
        </tar-button>
        <tar-button variant="filled" color="warn" testId="user-drawer-delete" type="button" (clicked)="deleteRequested.emit(u)">
          Delete
        </tar-button>
      }
    </div>
  </aside>
}
