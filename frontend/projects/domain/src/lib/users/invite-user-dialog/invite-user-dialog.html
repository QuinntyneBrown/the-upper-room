<tar-dialog [open]="true" title="Invite a user" testId="invite-dialog" [showActions]="false" (closed)="cancelled.emit()">
  <form (submit)="onSubmit($event)" novalidate>
    <tar-text-field
      testId="invite-email"
      errorTestId="invite-error-email"
      label="Email"
      type="email"
      autocomplete="email"
      [value]="email()"
      [error]="emailError"
      (valueChange)="email.set($event)"
    />

    <div class="row">
      <tar-text-field
        testId="invite-first-name"
        label="First name"
        [value]="firstName()"
        (valueChange)="firstName.set($event)"
      />
      <tar-text-field
        testId="invite-last-name"
        label="Last name"
        [value]="lastName()"
        (valueChange)="lastName.set($event)"
      />
    </div>

    <tar-select
      testId="invite-role"
      label="Role"
      [value]="role()"
      [options]="roleOptions"
      (valueChange)="role.set($event)"
    />

    <tar-text-field
      testId="invite-city"
      label="City"
      [value]="city()"
      (valueChange)="city.set($event)"
    />

    <tar-textarea
      testId="invite-message"
      label="Personal message (optional)"
      [rows]="3"
      [value]="message()"
      (valueChange)="message.set($event)"
    />

    <div class="actions">
      <tar-button variant="text" testId="invite-cancel" type="button" (clicked)="cancelled.emit()">Cancel</tar-button>
      <tar-button variant="filled" testId="invite-submit" type="submit" [disabled]="!canSubmit()">Send invitation</tar-button>
    </div>
  </form>
</tar-dialog>
