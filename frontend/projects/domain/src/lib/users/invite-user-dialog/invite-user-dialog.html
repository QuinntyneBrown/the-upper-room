<h2 mat-dialog-title>Invite a user</h2>
<form (submit)="onSubmit($event)" novalidate>
  <mat-dialog-content>
    <tar-text-field
      testId="invite-email"
      errorTestId="invite-error-email"
      label="Email"
      type="email"
      autocomplete="email"
      [value]="email()"
      [error]="data.emailError()"
      (valueChange)="email.set($event)"
    />

    <div class="row">
      <tar-text-field
        testId="invite-first-name"
        label="First name"
        [value]="firstName()"
        (valueChange)="firstName.set($event)"
      />
      <tar-text-field
        testId="invite-last-name"
        label="Last name"
        [value]="lastName()"
        (valueChange)="lastName.set($event)"
      />
    </div>

    <tar-select
      testId="invite-role"
      label="Role"
      [value]="role()"
      [options]="roleOptions"
      (valueChange)="role.set($event)"
    />

    <tar-text-field
      testId="invite-city"
      label="City"
      [value]="city()"
      (valueChange)="city.set($event)"
    />

    <tar-textarea
      testId="invite-message"
      label="Personal message (optional)"
      [rows]="3"
      [value]="message()"
      (valueChange)="message.set($event)"
    />
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <tar-button variant="text" testId="invite-cancel" type="button" (clicked)="onCancel()">Cancel</tar-button>
    <tar-button variant="filled" testId="invite-submit" type="submit" [disabled]="!canSubmit()">Send invitation</tar-button>
  </mat-dialog-actions>
</form>
