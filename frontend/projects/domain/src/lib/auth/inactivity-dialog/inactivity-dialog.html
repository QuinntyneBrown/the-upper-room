<h2 mat-dialog-title>Are you still there?</h2>
<mat-dialog-content>
  <p class="inactivity-dialog__body">
    You'll be signed out in
    <span data-testid="inactivity-countdown">{{ idle.countdown() }}</span> seconds.
  </p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <tar-button
    testId="inactivity-stay"
    variant="filled"
    (clicked)="idle.staySignedIn()"
  >
    Stay signed in
  </tar-button>
</mat-dialog-actions>
