<form class="partner-form" (submit)="onSubmit($event)" novalidate>
  <div class="save-bar">
    <span data-testid="partner-unsaved-dot" class="unsaved-dot" [class.unsaved-dot--visible]="isDirty()"></span>
    <h1 class="save-bar__title">New Partner</h1>
    <tar-button variant="outlined" type="button" testId="partner-cancel" (clicked)="onCancel()">Cancel</tar-button>
    <tar-button variant="filled" type="submit" testId="partner-submit" [disabled]="submitting()">Save</tar-button>
  </div>

  @if (formBanner()) {
    <div data-testid="partner-form-banner" class="form-banner">{{ formBanner() }}</div>
  }

  <div class="form-body">
    <section class="form-section">
      <h2 class="form-section__heading">Basic info</h2>

      <tar-text-field
        label="Name"
        testId="partner-name"
        errorTestId="partner-error-name"
        [required]="true"
        autocomplete="organization"
        [value]="name()"
        [error]="nameError()"
        (valueChange)="name.set($event)"
      />

      <div class="field__input-group">
        <tar-text-field
          label="Website"
          testId="partner-website"
          errorTestId="partner-error-website"
          type="url"
          placeholder="https://example.org"
          [value]="website()"
          [error]="websiteError()"
          (valueChange)="website.set($event)"
        />
        @if (websiteValid() && website()) {
          <a
            data-testid="partner-visit-link"
            class="field__trailing-link"
            [href]="website()"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit website"
          >
            <mat-icon>open_in_new</mat-icon>
          </a>
        }
      </div>
    </section>
  </div>
</form>
