@if (!loading()) {
  <form class="partner-form" (submit)="onSubmit($event)" novalidate>
    <div class="save-bar">
      <span data-testid="partner-unsaved-dot" class="unsaved-dot" [class.unsaved-dot--visible]="isDirty()"></span>
      <h1 class="save-bar__title">Edit Partner</h1>
      <tar-button variant="outlined" type="button" testId="partner-cancel" (clicked)="onCancel()">Cancel</tar-button>
      <tar-button variant="filled" type="submit" testId="partner-submit" [disabled]="submitting()">Save</tar-button>
    </div>

    @if (formBanner()) {
      <div data-testid="partner-form-banner" class="form-banner">{{ formBanner() }}</div>
    }

    <div class="form-body">
      <section class="form-section">
        <h2 class="form-section__heading">Basic info</h2>

        <tar-text-field
          label="Name"
          testId="partner-name"
          errorTestId="partner-error-name"
          [required]="true"
          autocomplete="organization"
          [value]="name()"
          [error]="nameError()"
          (valueChange)="name.set($event)"
        />

        <div class="field__input-group">
          <tar-text-field
            label="Website"
            testId="partner-website"
            errorTestId="partner-error-website"
            type="url"
            placeholder="https://example.org"
            [value]="website()"
            [error]="websiteError()"
            (valueChange)="website.set($event)"
          />
          @if (websiteValid() && website()) {
            <a
              data-testid="partner-visit-link"
              class="field__trailing-link"
              [href]="website()"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Visit website"
            >
              <mat-icon>open_in_new</mat-icon>
            </a>
          }
        </div>
      </section>

      <section class="form-section">
        <h2 class="form-section__heading">Social links</h2>

        @for (link of socialLinks(); track $index; let i = $index) {
          <div [attr.data-testid]="'social-link-' + i" class="social-link-row">
            <tar-select
              label="Platform"
              [testId]="'social-platform-' + i"
              [value]="link.platform"
              [options]="platformOptions"
              (valueChange)="updatePlatform(i, $event)"
            />

            <tar-text-field
              label="URL"
              [testId]="'social-url-' + i"
              [errorTestId]="'social-url-error-' + i"
              type="url"
              placeholder="https://..."
              [value]="link.url"
              [error]="socialErrors()[i]?.urlError ?? null"
              (valueChange)="updateUrl(i, $event)"
            />

            @if (link.platform === 'Other') {
              <tar-text-field
                label="Custom label"
                [testId]="'social-label-' + i"
                [errorTestId]="'social-label-error-' + i"
                [value]="link.label"
                [error]="socialErrors()[i]?.labelError ?? null"
                (valueChange)="updateLabel(i, $event)"
              />
            }

            <tar-icon-button
              icon="close"
              ariaLabel="Remove link"
              [testId]="'social-remove-' + i"
              (clicked)="removeLink(i)"
            />
          </div>
        }

        <tar-button variant="outlined" icon="add" type="button" testId="social-add-button" (clicked)="addLink()">Add link</tar-button>
      </section>
    </div>
  </form>
}
