<h2 mat-dialog-title>Edit recurring event</h2>
<mat-dialog-content>
  <p>Which events do you want to change?</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button data-testid="recurrence-edit-single" type="button" class="btn-filled" (click)="choose('single')">
    This event only
  </button>
  <button data-testid="recurrence-edit-following" type="button" class="btn-tonal" (click)="choose('following')">
    This and following events
  </button>
  <button data-testid="recurrence-edit-series" type="button" class="btn-outlined" (click)="choose('series')">
    Entire series
  </button>
</mat-dialog-actions>
