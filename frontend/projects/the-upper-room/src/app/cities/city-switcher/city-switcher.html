@if (canSwitch()) {
  <div class="city-switcher">
    <button
      data-testid="city-switcher-trigger"
      type="button"
      class="city-switcher__trigger"
      (click)="toggle()"
    >
      {{ currentLabel() }}
    </button>
    @if (open()) {
      <ul data-testid="city-switcher-menu" class="city-switcher__menu" role="menu">
        @for (c of visibleCities(); track c.id) {
          <li
            [attr.data-testid]="'city-switcher-option-' + c.slug"
            role="menuitem"
            class="city-switcher__item"
            (click)="select(c.slug)"
          >
            <span>{{ c.name }}</span>
            @if (scope.current() === c.slug) {
              <span aria-label="current">✓</span>
            }
          </li>
        }
        <li
          data-testid="city-switcher-option-all"
          role="menuitem"
          class="city-switcher__item city-switcher__item--all"
          (click)="select(allCitiesValue)"
        >
          All cities (read-only)
          @if (scope.isAllCities()) {
            <span aria-label="current">✓</span>
          }
        </li>
      </ul>
    }
  </div>
  @if (scope.isAllCities()) {
    <tar-banner
      testId="city-switcher-all-banner"
      severity="warning"
      message="Switch to a single city to make changes."
      [dismissible]="false"
    />
  }
}
