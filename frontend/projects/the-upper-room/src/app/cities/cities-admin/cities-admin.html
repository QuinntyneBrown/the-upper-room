<section class="cities-admin">
  <header class="cities-admin__header">
    <h1 class="cities-admin__title">Cities</h1>
    <tar-button testId="cities-new" variant="filled" icon="add" (clicked)="onNew()">
      New city
    </tar-button>
  </header>

  @if (creating()) {
    <form class="cities-admin__card" (submit)="onSave($event)" novalidate>
      <tar-text-field
        label="Name"
        testId="cities-name"
        [value]="newName()"
        [hint]="'Slug preview: ' + (slugPreview() || '—')"
        (valueChange)="newName.set($event)"
      />
      <tar-text-field
        label="Country"
        testId="cities-country"
        [value]="newCountry()"
        (valueChange)="newCountry.set($event)"
      />
      @if (formError(); as msg) {
        <p data-testid="cities-form-error" class="cities-admin__error">{{ msg }}</p>
      }
      <tar-form-actions
        saveLabel="Save"
        cancelLabel="Cancel"
        saveTestId="cities-save"
        [dirty]="true"
        (saved)="onSubmitForm()"
        (cancelled)="creating.set(false)"
      />
    </form>
  }

  <table mat-table [dataSource]="cities()" class="cities-admin__table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let c">{{ c.name }}</td>
    </ng-container>
    <ng-container matColumnDef="slug">
      <th mat-header-cell *matHeaderCellDef>Slug</th>
      <td mat-cell *matCellDef="let c">{{ c.slug }}</td>
    </ng-container>
    <ng-container matColumnDef="country">
      <th mat-header-cell *matHeaderCellDef>Country</th>
      <td mat-cell *matCellDef="let c">{{ c.country }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let c">{{ c.archived ? 'Archived' : 'Active' }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let c">
        @if (!c.archived) {
          <tar-button [testId]="'city-archive-' + c.slug" variant="outlined" (clicked)="onArchive(c)">Archive</tar-button>
        }
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" [attr.data-testid]="'city-row-' + row.slug"></tr>
  </table>
</section>
