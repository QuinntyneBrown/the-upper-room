<section class="cities-admin">
  <header class="cities-admin__header">
    <h1 class="cities-admin__title">Cities</h1>
    <tar-button testId="cities-new" variant="filled" icon="add" (clicked)="onNew()">
      New city
    </tar-button>
  </header>

  @if (creating()) {
    <form class="cities-admin__card" (submit)="onSave($event)" novalidate>
      <tar-text-field
        label="Name"
        testId="cities-name"
        [value]="newName()"
        [hint]="'Slug preview: ' + (slugPreview() || '—')"
        (valueChange)="newName.set($event)"
      />
      <tar-text-field
        label="Country"
        testId="cities-country"
        [value]="newCountry()"
        (valueChange)="newCountry.set($event)"
      />
      @if (formError(); as msg) {
        <p data-testid="cities-form-error" class="cities-admin__error">{{ msg }}</p>
      }
      <tar-form-actions
        saveLabel="Save"
        cancelLabel="Cancel"
        saveTestId="cities-save"
        [dirty]="true"
        (saved)="onSubmitForm()"
        (cancelled)="creating.set(false)"
      />
    </form>
  }

  <table class="cities-admin__table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Slug</th>
        <th>Country</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (c of cities(); track c.id) {
        <tr [attr.data-testid]="'city-row-' + c.slug">
          <td>{{ c.name }}</td>
          <td>{{ c.slug }}</td>
          <td>{{ c.country }}</td>
          <td>{{ c.archived ? 'Archived' : 'Active' }}</td>
          <td>
            @if (!c.archived) {
              <tar-button
                [testId]="'city-archive-' + c.slug"
                variant="outlined"
                (clicked)="onArchive(c)"
              >
                Archive
              </tar-button>
            }
          </td>
        </tr>
      }
    </tbody>
  </table>
</section>
