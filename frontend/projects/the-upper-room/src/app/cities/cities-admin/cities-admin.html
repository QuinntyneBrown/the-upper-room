<section class="page">
  <header class="header">
    <h1>Cities</h1>
    <button data-testid="cities-new" type="button" class="btn" (click)="onNew()">New city</button>
  </header>

  @if (creating()) {
    <form class="card" (submit)="onSave($event)" novalidate>
      <label class="field">
        <span class="field__label">Name</span>
        <input
          data-testid="cities-name"
          class="field__input"
          type="text"
          [value]="newName()"
          (input)="newName.set($any($event.target).value)"
        />
        <small>Slug preview: {{ slugPreview() || '—' }}</small>
      </label>
      <label class="field">
        <span class="field__label">Country</span>
        <input
          data-testid="cities-country"
          class="field__input"
          type="text"
          [value]="newCountry()"
          (input)="newCountry.set($any($event.target).value)"
        />
      </label>
      @if (formError(); as msg) {
        <p data-testid="cities-form-error" class="error">{{ msg }}</p>
      }
      <div class="actions">
        <button type="button" class="btn btn--ghost" (click)="creating.set(false)">Cancel</button>
        <button data-testid="cities-save" type="submit" class="btn">Save</button>
      </div>
    </form>
  }

  <table class="table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Slug</th>
        <th>Country</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (c of cities(); track c.id) {
        <tr [attr.data-testid]="'city-row-' + c.slug">
          <td>{{ c.name }}</td>
          <td>{{ c.slug }}</td>
          <td>{{ c.country }}</td>
          <td>{{ c.archived ? 'Archived' : 'Active' }}</td>
          <td>
            @if (!c.archived) {
              <button
                [attr.data-testid]="'city-archive-' + c.slug"
                type="button"
                class="btn btn--ghost"
                (click)="onArchive(c)"
              >
                Archive
              </button>
            }
          </td>
        </tr>
      }
    </tbody>
  </table>
</section>
