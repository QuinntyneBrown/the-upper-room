@if (board(); as b) {
  <header class="page-header">
    <h1 class="page-header__title">Configure: {{ b.name }}</h1>
  </header>

  <section class="config-section">
    <h2 class="config-section__heading">Swimlanes</h2>
    <tar-select
      label="Group by"
      testId="board-configure-swimlane-select"
      [value]="swimlaneMode()"
      [options]="swimlaneModeOptions"
      (valueChange)="onSwimlaneChange($event)"
    />
  </section>

  <ul class="column-list">
    @for (column of columns(); track column.id) {
      <li
        [attr.data-testid]="'config-column-row-' + column.name"
        class="column-row"
        draggable="true"
        (dragstart)="onDragStart($event, column)"
        (dragover)="onDragOver($event)"
        (drop)="onDrop($event, column)"
      >
        <span class="column-row__handle" aria-hidden="true">::</span>
        <span class="column-row__name">{{ column.name }}</span>
        <span class="column-row__count">
          {{ cardCountByColumn().get(column.id) ?? 0 }} cards
        </span>
        <tar-button
          variant="text"
          [testId]="'config-column-delete-' + column.name"
          type="button"
          (clicked)="onDeleteColumn(column)"
        >Delete</tar-button>
      </li>
    }
  </ul>

  @if (deleteTarget(); as target) {
    <tar-dialog
      [open]="true"
      [title]="'Move ' + cardsInDeleteTarget() + ' cards from \'' + target.name + '\' to...'"
      testId="config-move-cards-dialog"
      [showActions]="false"
      (closed)="cancelMove()"
    >
      <tar-select
        label="Move to column"
        testId="config-move-cards-target"
        [value]="moveCardsTo()"
        [options]="moveCardsTargetOptions()"
        (valueChange)="moveCardsTo.set($event)"
      />
      <div class="dialog__actions">
        <tar-button variant="text" type="button" (clicked)="cancelMove()">Cancel</tar-button>
        <tar-button variant="filled" testId="config-move-cards-confirm" type="button" (clicked)="confirmMove()">Confirm</tar-button>
      </div>
    </tar-dialog>
  }
}
