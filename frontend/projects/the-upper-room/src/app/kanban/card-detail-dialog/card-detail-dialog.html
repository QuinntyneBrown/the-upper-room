<tar-dialog [open]="true" testId="card-detail-dialog" [showActions]="false" [closeOnBackdrop]="false" (closed)="onClose()">
  <header class="dialog__header">
    <tar-text-field
      testId="card-detail-title"
      [value]="currentTitle()"
      (valueChange)="currentTitle.set($event)"
      (blurred)="onTitleBlur()"
    />
    <div class="dialog__header-actions">
      <tar-button variant="text" testId="card-detail-archive" type="button" (clicked)="onArchive()">Archive</tar-button>
      <tar-button variant="text" color="warn" testId="card-detail-delete" type="button" (clicked)="onDelete()">Delete</tar-button>
      <tar-icon-button icon="close" ariaLabel="Close" testId="card-detail-close" (clicked)="onClose()" />
    </div>
  </header>

  @if (schema.length > 0) {
    <section class="dialog__section">
      <h3 class="dialog__section-title">Details</h3>
      @for (field of schema; track field.key) {
        <tar-text-field
          [testId]="'card-detail-field-' + field.key"
          [errorTestId]="'card-detail-field-error-' + field.key"
          [label]="field.label"
          [required]="field.required"
          [value]="fieldValue(field.key)"
          [error]="fieldErrors()[field.key] ?? null"
          (valueChange)="onFieldInput(field.key, $event)"
        />
      }
    </section>
  }

  <section class="dialog__section">
    <h3 class="dialog__section-title">Comments</h3>
    <ul data-testid="card-detail-comments" class="dialog__comments">
      @for (c of comments(); track $index) {
        <li class="dialog__comment">{{ c }}</li>
      }
    </ul>
    <div class="dialog__comment-input-row">
      <tar-textarea
        testId="card-detail-comment-input"
        [rows]="2"
        [value]="newComment()"
        (valueChange)="newComment.set($event)"
      />
      <tar-button variant="filled" testId="card-detail-comment-add" type="button" (clicked)="addComment()">Add</tar-button>
    </div>
  </section>

  <section class="dialog__section">
    <h3 class="dialog__section-title">Attachments</h3>
    <ul data-testid="card-detail-attachments" class="dialog__attachments">
      @for (a of attachments(); track $index) {
        <li class="dialog__attachment">{{ a }}</li>
      }
    </ul>
    <input
      data-testid="card-detail-attachment-input"
      type="file"
      accept="application/pdf,image/*"
      aria-label="Attach file"
      #fileInput
      (change)="onAttach(fileInput)"
    />
  </section>
</tar-dialog>
