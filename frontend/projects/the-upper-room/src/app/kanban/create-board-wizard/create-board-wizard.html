<h2 mat-dialog-title>New board</h2>
<form (submit)="onSubmit($event)" novalidate>
  <mat-dialog-content>
    <tar-text-field
      label="Name"
      testId="create-board-name"
      [required]="true"
      [value]="name()"
      (valueChange)="name.set($event)"
    />
    <tar-textarea
      label="Description"
      testId="create-board-description"
      [rows]="3"
      [value]="description()"
      (valueChange)="description.set($event)"
    />
    <tar-checkbox
      testId="create-board-default-columns"
      [checked]="defaultColumns()"
      (checkedChange)="defaultColumns.set($event)"
    >Create with default columns (To do, In progress, Done)</tar-checkbox>
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <tar-button variant="text" testId="create-board-cancel" type="button" (clicked)="onCancel()">Cancel</tar-button>
    <tar-button variant="filled" testId="create-board-submit" type="submit">Create</tar-button>
  </mat-dialog-actions>
</form>
