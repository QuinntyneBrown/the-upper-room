<form class="contact-form" (submit)="onSubmit($event)" novalidate>
  <div class="save-bar">
    <span data-testid="contact-unsaved-dot" class="unsaved-dot" [class.unsaved-dot--visible]="isDirty()"></span>
    <h1 class="save-bar__title">New Contact</h1>
    <tar-button variant="outlined" type="button" testId="contact-cancel" (clicked)="onCancel()">Cancel</tar-button>
    <tar-button variant="filled" type="submit" testId="contact-submit" [disabled]="submitting()">Save</tar-button>
  </div>

  @if (formBanner()) {
    <div data-testid="contact-form-banner" class="form-banner">{{ formBanner() }}</div>
  }

  <div class="form-body">
    <div class="field-row">
      <tar-text-field
        label="First name"
        testId="contact-first-name"
        errorTestId="contact-error-first-name"
        [required]="true"
        autocomplete="given-name"
        [value]="firstName()"
        [error]="firstNameError()"
        (valueChange)="firstName.set($event)"
      />
      <tar-text-field
        label="Last name"
        testId="contact-last-name"
        autocomplete="family-name"
        [value]="lastName()"
        (valueChange)="lastName.set($event)"
      />
    </div>

    <tar-text-field
      label="Pronouns"
      testId="contact-pronouns"
      [value]="pronouns()"
      (valueChange)="pronouns.set($event)"
    />

    <div class="field-row">
      <tar-text-field
        label="Title"
        testId="contact-title"
        [value]="title()"
        (valueChange)="title.set($event)"
      />
      <tar-text-field
        label="Organization"
        testId="contact-org"
        autocomplete="organization"
        [value]="org()"
        (valueChange)="org.set($event)"
      />
    </div>

    <tar-text-field
      label="Display name override"
      testId="contact-display-name"
      [value]="displayName()"
      (valueChange)="displayName.set($event)"
    />

    <section class="methods-section">
      <h2 class="methods-section__heading">Tags</h2>
      <tar-tag-selector [tags]="tags()" (tagsChange)="tags.set($event)" />
    </section>

    <section class="methods-section">
      <h2 class="methods-section__heading">Phones</h2>
      @for (phone of phones(); track $index) {
        <div [attr.data-testid]="'contact-phone-row-' + $index" class="method-row">
          <tar-text-field
            [testId]="'contact-phone-input-' + $index"
            [errorTestId]="'contact-phone-error-' + $index"
            type="tel"
            placeholder="+1 416 555 0100"
            [value]="phone.value"
            [error]="phone.error"
            (valueChange)="updatePhone($index, 'value', $event)"
          />
          <tar-text-field
            class="method-row__label"
            placeholder="Label"
            [value]="phone.label"
            (valueChange)="updatePhone($index, 'label', $event)"
          />
          <tar-checkbox
            [checked]="phone.primary"
            (checkedChange)="updatePhone($index, 'primary', $event)"
          >Primary</tar-checkbox>
          <tar-icon-button
            icon="close"
            ariaLabel="Remove phone"
            [testId]="'contact-phone-remove-' + $index"
            (clicked)="removePhone($index)"
          />
        </div>
      }
      <tar-button variant="outlined" icon="add" type="button" testId="contact-add-phone" (clicked)="addPhone()">Add phone</tar-button>
    </section>

    <section class="methods-section">
      <h2 class="methods-section__heading">Emails</h2>
      @for (email of emails(); track $index) {
        <div [attr.data-testid]="'contact-email-row-' + $index" class="method-row">
          <tar-text-field
            [testId]="'contact-email-input-' + $index"
            type="email"
            placeholder="email@example.com"
            [value]="email.value"
            (valueChange)="updateEmail($index, 'value', $event)"
          />
          <tar-text-field
            class="method-row__label"
            placeholder="Label"
            [value]="email.label"
            (valueChange)="updateEmail($index, 'label', $event)"
          />
          <tar-checkbox
            [testId]="'contact-email-primary-' + $index"
            [checked]="email.primary"
            (checkedChange)="updateEmail($index, 'primary', $event)"
          >Primary</tar-checkbox>
        </div>
      }
      <tar-button variant="outlined" icon="add" type="button" testId="contact-add-email" (clicked)="addEmail()">Add email</tar-button>
    </section>

    <section class="methods-section">
      <h2 class="methods-section__heading">Addresses</h2>
      @for (addr of addresses(); track $index) {
        <div [attr.data-testid]="'contact-address-row-' + $index" class="method-row method-row--address">
          <tar-text-field placeholder="Street" [value]="addr.street" (valueChange)="updateAddress($index, 'street', $event)" />
          <tar-text-field placeholder="City" [value]="addr.city" (valueChange)="updateAddress($index, 'city', $event)" />
          <tar-text-field placeholder="Country" [value]="addr.country" (valueChange)="updateAddress($index, 'country', $event)" />
        </div>
      }
      <tar-button variant="outlined" icon="add" type="button" testId="contact-add-address" (clicked)="addAddress()">Add address</tar-button>
    </section>
  </div>
</form>
