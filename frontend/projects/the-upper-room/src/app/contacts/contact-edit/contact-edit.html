<form class="contact-form" (submit)="onSubmit($event)" novalidate>
  <div class="save-bar">
    <span data-testid="contact-unsaved-dot" class="unsaved-dot" [class.unsaved-dot--visible]="isDirty()"></span>
    <h1 class="save-bar__title">Edit Contact</h1>
    <tar-button variant="outlined" type="button" testId="contact-cancel" (clicked)="onCancel()">Cancel</tar-button>
    <tar-button variant="filled" type="submit" testId="contact-submit" [disabled]="submitting()">Save</tar-button>
  </div>

  @if (formBanner()) {
    <div data-testid="contact-form-banner" class="form-banner">
      {{ formBanner() }}
      <tar-button variant="text" type="button" testId="contact-reload-button" (clicked)="onReload()">Reload</tar-button>
    </div>
  }

  <div class="form-body">
    <div class="field-row">
      <tar-text-field
        label="First name"
        testId="contact-first-name"
        errorTestId="contact-error-first-name"
        [required]="true"
        autocomplete="given-name"
        [value]="firstName()"
        [error]="firstNameError()"
        (valueChange)="firstName.set($event); setDirty()"
      />
      <tar-text-field
        label="Last name"
        testId="contact-last-name"
        autocomplete="family-name"
        [value]="lastName()"
        (valueChange)="lastName.set($event); setDirty()"
      />
    </div>

    <tar-text-field
      label="Pronouns"
      testId="contact-pronouns"
      [value]="pronouns()"
      (valueChange)="pronouns.set($event); setDirty()"
    />

    <div class="field-row">
      <tar-text-field
        label="Title"
        testId="contact-title"
        [value]="title()"
        (valueChange)="title.set($event); setDirty()"
      />
      <tar-text-field
        label="Organization"
        testId="contact-org"
        [value]="org()"
        (valueChange)="org.set($event); setDirty()"
      />
    </div>

    <tar-text-field
      label="Display name override"
      testId="contact-display-name"
      [value]="displayName()"
      (valueChange)="displayName.set($event); setDirty()"
    />

    <section class="methods-section">
      <h2 class="methods-section__heading">Tags</h2>
      <tar-tag-selector [tags]="tags()" (tagsChange)="tags.set($event); setDirty()" />
    </section>
  </div>
</form>
