@let isOpen = drawerOpen();
@let didScroll = scrolled();

<a data-testid="skip-link" class="app-shell__skip-link" href="#main" (click)="skipToMain($event)">
  Skip to main content
</a>

<header
  data-testid="top-bar"
  class="app-shell__top-bar"
  [class.app-shell__top-bar--elevated]="didScroll"
>
  <tar-icon-button
    testId="drawer-toggle"
    icon="menu"
    ariaLabel="Open navigation"
    class="app-shell__drawer-toggle"
    (clicked)="toggleDrawer()"
  />
  <a routerLink="/dashboard" class="app-shell__app-name">The Upper Room</a>
  <span class="app-shell__spacer"></span>
  <tar-city-switcher />
  <tar-notification-bell />
  <div class="app-shell__avatar">
    <button
      mat-icon-button
      data-testid="avatar-trigger"
      type="button"
      aria-label="Account menu"
      [matMenuTriggerFor]="avatarMenu"
    >
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #avatarMenu="matMenu" xPosition="before">
      <button mat-menu-item data-testid="avatar-menu-sign-out" type="button" (click)="onSignOut()">
        <mat-icon>logout</mat-icon>
        <span>Sign out</span>
      </button>
    </mat-menu>
  </div>
</header>

<app-offline-banner />

<div class="app-shell__layout">
  <nav
    data-testid="drawer"
    class="app-shell__drawer"
    [attr.aria-hidden]="!isOpen"
    [class.app-shell__drawer--open]="isOpen"
  ></nav>

  @if (isOpen) {
    <div data-testid="drawer-scrim" class="app-shell__scrim" (click)="closeDrawer()"></div>
  }

  <div class="app-shell__content">
    <nav data-testid="breadcrumbs" class="app-shell__breadcrumbs" aria-label="Breadcrumb">
      @for (c of crumbs(); track c.url; let last = $last) {
        <a [attr.aria-current]="last ? 'page' : null" [href]="c.url">{{ c.label }}</a>
        @if (!last) {
          <span aria-hidden="true">/</span>
        }
      }
    </nav>

    <main id="main" tabindex="-1" class="app-shell__main">
      <router-outlet />
    </main>

    <footer data-testid="footer" class="app-shell__footer">© The Upper Room</footer>
  </div>
</div>
