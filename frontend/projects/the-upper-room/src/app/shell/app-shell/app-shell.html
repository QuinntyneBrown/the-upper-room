@let isOpen = drawerOpen();
@let didScroll = scrolled();

<a data-testid="skip-link" class="skip-link" href="#main" (click)="skipToMain($event)"
  >Skip to main content</a
>

<header data-testid="top-bar" class="top-bar" [class.is-elevated]="didScroll">
  <button
    data-testid="drawer-toggle"
    class="icon-btn drawer-toggle"
    type="button"
    aria-label="Open navigation"
    (click)="toggleDrawer()"
  >
    <tar-icon name="menu" />
  </button>
  <span class="app-name">The Upper Room</span>
  <span class="spacer"></span>
  <app-city-switcher />
  <div class="avatar">
    <button
      data-testid="avatar-trigger"
      class="icon-btn"
      type="button"
      aria-label="Account menu"
      (click)="toggleAvatarMenu()"
    >
      <tar-icon name="profile" />
    </button>
    @if (avatarMenuOpen()) {
      <div class="avatar__menu" role="menu">
        <button
          data-testid="avatar-menu-sign-out"
          type="button"
          class="avatar__item"
          role="menuitem"
          (click)="onSignOut()"
        >
          Sign out
        </button>
      </div>
    }
  </div>
</header>

<app-offline-banner />

<nav
  data-testid="drawer"
  class="drawer"
  [attr.aria-hidden]="!isOpen"
  [class.is-open]="isOpen"
  (keydown.escape)="closeDrawer()"
></nav>

@if (isOpen) {
  <div data-testid="drawer-scrim" class="scrim" (click)="closeDrawer()"></div>
}

<nav data-testid="breadcrumbs" class="breadcrumbs" aria-label="Breadcrumb">
  @for (c of crumbs(); track c.url; let last = $last) {
    <a [attr.aria-current]="last ? 'page' : null" [href]="c.url">{{ c.label }}</a>
    @if (!last) {
      <span aria-hidden="true">/</span>
    }
  }
</nav>

<main id="main" tabindex="-1">
  <router-outlet />
</main>

<footer data-testid="footer" class="footer">© The Upper Room</footer>
