<section class="page">
  <header class="page__header">
    <h1>Tags</h1>
  </header>

  <form class="create-form" (submit)="onCreate($event)" novalidate>
    <label class="field">
      <span class="field__label">Tag name</span>
      <input
        data-testid="tag-name"
        class="field__input"
        type="text"
        [value]="name()"
        (input)="name.set($any($event.target).value)"
      />
      @if (nameError()) {
        <span data-testid="tag-error-name" class="field__error">{{ nameError() }}</span>
      }
    </label>
    <label class="field">
      <span class="field__label">Color</span>
      <select
        data-testid="tag-color"
        class="field__input"
        [value]="color()"
        (change)="color.set($any($event.target).value)"
      >
        @for (c of colors; track c) {
          <option [value]="c">{{ c }}</option>
        }
      </select>
    </label>
    <button data-testid="tag-create" type="submit" class="btn">Add tag</button>
  </form>

  @for (group of groupedTags(); track group.color) {
    <section [attr.data-testid]="'tag-group-' + group.color" class="group">
      <h2 class="group__title">{{ group.color }}</h2>
      <div class="chips">
        @for (tag of group.tags; track tag.id) {
          <div [attr.data-testid]="'tag-chip-' + tag.id" class="chip" [attr.data-color]="tag.color">
            <span class="chip__label">{{ tag.name }}</span>
            @if (editingId() === tag.id) {
              <select
                [attr.data-testid]="'tag-edit-color-' + tag.id"
                class="chip__color-select"
                [value]="editColor()"
                (change)="editColor.set($any($event.target).value)"
              >
                @for (c of colors; track c) {
                  <option [value]="c">{{ c }}</option>
                }
              </select>
              <button
                [attr.data-testid]="'tag-save-edit-' + tag.id"
                type="button"
                class="chip__action"
                (click)="onSaveEdit(tag)"
              >Save</button>
            } @else {
              <button
                [attr.data-testid]="'tag-edit-' + tag.id"
                type="button"
                class="chip__action"
                (click)="onEdit(tag)"
              >Edit</button>
            }
            <button
              [attr.data-testid]="'tag-delete-' + tag.id"
              type="button"
              class="chip__action chip__action--danger"
              (click)="onDelete(tag)"
            >Delete</button>
          </div>
        }
      </div>
    </section>
  }
</section>
