<section class="tag-list">
  <header class="tag-list__header">
    <h1 class="tag-list__title">Tags</h1>
  </header>

  <form class="tag-list__create" (submit)="onCreate($event)" novalidate>
    <tar-text-field
      label="Tag name"
      testId="tag-name"
      errorTestId="tag-error-name"
      [value]="name()"
      [error]="nameError()"
      (valueChange)="name.set($event)"
    />
    <tar-select
      label="Color"
      testId="tag-color"
      [value]="color()"
      [options]="colorOptions"
      (valueChange)="color.set($event)"
    />
    <tar-button testId="tag-create" variant="filled" type="submit">Add tag</tar-button>
  </form>

  @for (group of groupedTags(); track group.color) {
    <section [attr.data-testid]="'tag-group-' + group.color" class="tag-list__group">
      <h2 class="tag-list__group-title">{{ group.color }}</h2>
      <div class="tag-list__chips">
        @for (tag of group.tags; track tag.id) {
          <div
            [attr.data-testid]="'tag-chip-' + tag.id"
            class="tag-list__chip"
            [attr.data-color]="tag.color"
          >
            <span class="tag-list__chip-label">{{ tag.name }}</span>
            @if (editingId() === tag.id) {
              <tar-select
                [testId]="'tag-edit-color-' + tag.id"
                [value]="editColor()"
                [options]="colorOptions"
                (valueChange)="editColor.set($event)"
              />
              <tar-button
                [testId]="'tag-save-edit-' + tag.id"
                variant="text"
                (clicked)="onSaveEdit(tag)"
              >
                Save
              </tar-button>
            } @else {
              <tar-button
                [testId]="'tag-edit-' + tag.id"
                variant="text"
                (clicked)="onEdit(tag)"
              >
                Edit
              </tar-button>
            }
            <tar-button
              [testId]="'tag-delete-' + tag.id"
              variant="text"
              color="warn"
              (clicked)="onDelete(tag)"
            >
              Delete
            </tar-button>
          </div>
        }
      </div>
    </section>
  }
</section>
