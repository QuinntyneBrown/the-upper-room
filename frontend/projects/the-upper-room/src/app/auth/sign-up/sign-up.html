<section class="sign-up">
  @if (invitationExpired()) {
    <div data-testid="invitation-expired" class="sign-up__expired">
      <h1 class="sign-up__title">This invitation has expired.</h1>
      <p>Ask your city lead to send you a new one.</p>
      <a data-testid="invitation-request-new" routerLink="/sign-in" class="sign-up__link-btn">
        Request a new invite
      </a>
    </div>
  } @else {
    <form data-testid="sign-up-card" class="sign-up__card" (submit)="onSubmit($event)" novalidate>
      <h1 class="sign-up__title">Create your account</h1>

      <div>
        <tar-text-field
          label="Email"
          type="email"
          autocomplete="email"
          testId="sign-up-email"
          errorTestId="sign-up-error-email"
          [value]="email()"
          [readonly]="fromInvitation()"
          [error]="emailError()"
          (valueChange)="email.set($event)"
        />
        @if (emailError() && fromInvitation() === false) {
          <a data-testid="sign-up-sign-in-link" href="/sign-in" class="sign-up__sign-in-link">
            Sign in
          </a>
        }
      </div>

      <div class="sign-up__password">
        <tar-password-field
          label="Password"
          autocomplete="new-password"
          testId="sign-up-password"
          [value]="password()"
          (valueChange)="password.set($event)"
        />
        <tar-password-strength [password]="password()" [userEmail]="email()" />
      </div>

      <tar-text-field
        label="City"
        testId="sign-up-city"
        [value]="city()"
        [readonly]="fromInvitation()"
        (valueChange)="city.set($event)"
      />

      <tar-checkbox
        testId="sign-up-terms"
        [checked]="termsAccepted()"
        (checkedChange)="termsAccepted.set($event)"
      >
        I accept the terms and privacy policy
      </tar-checkbox>

      <tar-button
        testId="sign-up-submit"
        variant="filled"
        type="submit"
        [fullWidth]="true"
        [disabled]="!canSubmit()"
      >
        Create account
      </tar-button>
    </form>
  }
</section>
