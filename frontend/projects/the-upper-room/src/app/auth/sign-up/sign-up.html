<section class="page">
  @if (invitationExpired()) {
    <div data-testid="invitation-expired" class="card card--error">
      <h1>This invitation has expired.</h1>
      <p>Ask your city lead to send you a new one.</p>
      <a data-testid="invitation-request-new" routerLink="/sign-in" class="btn">
        Request a new invite
      </a>
    </div>
  } @else {
    <form data-testid="sign-up-card" class="card" (submit)="onSubmit($event)" novalidate>
      <h1 class="card__title">Create your account</h1>

      <label class="field">
        <span class="field__label">Email</span>
        <input
          data-testid="sign-up-email"
          class="field__input"
          type="email"
          autocomplete="email"
          [value]="email()"
          [readOnly]="fromInvitation()"
          (input)="email.set($any($event.target).value)"
        />
        @if (emailError(); as msg) {
          <span data-testid="sign-up-error-email" class="field__error">
            {{ msg }}
            <a data-testid="sign-up-sign-in-link" href="/sign-in">Sign in</a>
          </span>
        }
      </label>

      <label class="field">
        <span class="field__label">Password</span>
        <input
          data-testid="sign-up-password"
          class="field__input"
          type="password"
          autocomplete="new-password"
          [value]="password()"
          (input)="password.set($any($event.target).value)"
        />
      </label>

      <label class="field">
        <span class="field__label">City</span>
        <input
          data-testid="sign-up-city"
          class="field__input"
          type="text"
          [value]="city()"
          [readOnly]="fromInvitation()"
          (input)="city.set($any($event.target).value)"
        />
      </label>

      <label class="terms">
        <input
          data-testid="sign-up-terms"
          type="checkbox"
          [checked]="termsAccepted()"
          (change)="termsAccepted.set($any($event.target).checked)"
        />
        <span>I accept the terms and privacy policy</span>
      </label>

      <button
        data-testid="sign-up-submit"
        type="submit"
        class="card__submit"
        [disabled]="!canSubmit()"
      >
        Create account
      </button>
    </form>
  }
</section>
