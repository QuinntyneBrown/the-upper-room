<main class="sign-in">
  <form
    data-testid="sign-in-card"
    class="sign-in__card"
    (submit)="onSubmit($event)"
    novalidate
    aria-labelledby="sign-in-title"
  >
    <h1 id="sign-in-title" class="sign-in__title">Sign in</h1>

    <tar-text-field
      label="Email"
      type="email"
      autocomplete="email"
      testId="sign-in-email"
      errorTestId="sign-in-error-email"
      [value]="email()"
      [error]="emailError()"
      (valueChange)="email.set($event)"
    />

    <tar-password-field
      label="Password"
      autocomplete="current-password"
      testId="sign-in-password"
      toggleTestId="sign-in-toggle-visibility"
      [value]="password()"
      (valueChange)="password.set($event)"
    />

    @if (formError(); as msg) {
      <p data-testid="sign-in-error-form" class="sign-in__form-error" role="alert">{{ msg }}</p>
    }

    <tar-button
      testId="sign-in-submit"
      variant="filled"
      type="submit"
      [fullWidth]="true"
      [disabled]="submitting()"
    >
      Sign in
    </tar-button>

    <div class="sign-in__links">
      <a data-testid="sign-in-forgot" routerLink="/forgot-password">Forgot password?</a>
      <a data-testid="sign-in-signup" routerLink="/sign-up">Create account</a>
    </div>
  </form>
</main>
