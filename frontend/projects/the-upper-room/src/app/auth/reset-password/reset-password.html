<section class="reset-password">
  @if (expired()) {
    <div class="reset-password__card">
      <h1 data-testid="reset-expired" class="reset-password__title">This reset link has expired.</h1>
      <p>Please request a new one.</p>
      <a routerLink="/forgot-password" class="reset-password__link-btn">Forgot password</a>
    </div>
  } @else {
    <form class="reset-password__card" (submit)="onSubmit($event)" novalidate>
      <h1 class="reset-password__title">Reset password</h1>
      <tar-password-field
        label="New password"
        autocomplete="new-password"
        testId="reset-new-password"
        [value]="newPwd()"
        (valueChange)="newPwd.set($event)"
      />
      <tar-password-field
        label="Confirm password"
        autocomplete="new-password"
        testId="reset-confirm-password"
        errorTestId="reset-error-confirm"
        [value]="confirmPwd()"
        [error]="confirmError()"
        (valueChange)="confirmPwd.set($event)"
      />
      <tar-button testId="reset-submit" variant="filled" type="submit" [fullWidth]="true">
        Reset password
      </tar-button>
    </form>
  }
</section>
