<section class="forgot-password">
  <form class="forgot-password__card" (submit)="onSubmit($event)" novalidate>
    <h1 class="forgot-password__title">Forgot password</h1>
    <tar-text-field
      label="Email"
      type="email"
      autocomplete="email"
      placeholder="Email"
      testId="forgot-email"
      [value]="email()"
      (valueChange)="email.set($event)"
    />
    <tar-button testId="forgot-submit" variant="filled" type="submit" [fullWidth]="true">
      Send reset link
    </tar-button>
    @if (sent()) {
      <p data-testid="forgot-message" class="forgot-password__message">
        If an account exists for {{ submittedEmail() }}, a reset link has been sent.
      </p>
    }
  </form>
</section>
