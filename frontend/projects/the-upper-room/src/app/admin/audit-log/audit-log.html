<header class="audit-log__header">
  <h1 class="audit-log__title">Audit Log</h1>
</header>

<section class="audit-log__filters">
  <tar-text-field
    testId="audit-filter-actor"
    placeholder="Actor"
    [value]="filterActor()"
    (valueChange)="filterActor.set($event)"
  />
  <tar-text-field
    testId="audit-filter-entity-type"
    placeholder="Entity type"
    [value]="filterEntityType()"
    (valueChange)="filterEntityType.set($event)"
  />
  <tar-select
    testId="audit-filter-action"
    placeholder="All actions"
    [value]="filterAction()"
    [options]="actionOptions"
    (valueChange)="filterAction.set($event)"
  />
  <tar-button variant="filled" testId="audit-filter-apply" (clicked)="applyFilters()">Apply</tar-button>
</section>

@if (entries().length === 0) {
  <p data-testid="audit-log-empty" class="audit-log__empty">No audit entries found.</p>
} @else {
  <table mat-table [dataSource]="entries()" data-testid="audit-log-table" class="audit-log__table">
    <ng-container matColumnDef="timestamp">
      <th mat-header-cell *matHeaderCellDef>Timestamp</th>
      <td mat-cell *matCellDef="let entry">{{ entry.timestamp | date:'short' }}</td>
    </ng-container>
    <ng-container matColumnDef="actor">
      <th mat-header-cell *matHeaderCellDef>Actor</th>
      <td mat-cell *matCellDef="let entry">{{ entry.actorUserId }}</td>
    </ng-container>
    <ng-container matColumnDef="entityType">
      <th mat-header-cell *matHeaderCellDef>Entity Type</th>
      <td mat-cell *matCellDef="let entry">{{ entry.entityType }}</td>
    </ng-container>
    <ng-container matColumnDef="entityId">
      <th mat-header-cell *matHeaderCellDef>Entity ID</th>
      <td mat-cell *matCellDef="let entry">{{ entry.entityId }}</td>
    </ng-container>
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef>Action</th>
      <td mat-cell *matCellDef="let entry">{{ entry.action }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" data-testid="audit-log-row"></tr>
  </table>

  <div class="audit-log__pagination">
    <tar-button variant="outlined" testId="audit-page-prev" [disabled]="page() === 1" (clicked)="prevPage()">Previous</tar-button>
    <span class="audit-log__page-info">Page {{ page() }}</span>
    <tar-button variant="outlined" testId="audit-page-next" [disabled]="page() * pageSize >= total()" (clicked)="nextPage()">Next</tar-button>
  </div>
}
