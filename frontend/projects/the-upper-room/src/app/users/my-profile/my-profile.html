<section class="my-profile">
  <h1 class="my-profile__title">My profile</h1>

  <tar-avatar-uploader [user]="form()" (fileSelected)="onAvatarSelected($event)" />

  <form class="my-profile__card" (submit)="onSave($event)" novalidate>
    <div class="my-profile__row">
      <tar-text-field
        label="First name"
        testId="profile-first-name"
        [value]="form().firstName"
        (valueChange)="update('firstName', $event)"
      />
      <tar-text-field
        label="Last name"
        testId="profile-last-name"
        [value]="form().lastName"
        (valueChange)="update('lastName', $event)"
      />
    </div>

    <tar-text-field
      label="Display name"
      testId="profile-display-name"
      [value]="form().displayName"
      (valueChange)="update('displayName', $event)"
    />

    <div class="my-profile__row">
      <tar-text-field
        label="Pronouns"
        testId="profile-pronouns"
        [value]="form().pronouns"
        (valueChange)="update('pronouns', $event)"
      />
      <tar-text-field
        label="Title"
        testId="profile-title"
        [value]="form().title"
        (valueChange)="update('title', $event)"
      />
    </div>

    <tar-text-field
      label="City"
      testId="profile-city"
      [value]="form().city"
      [readonly]="!canEditCity()"
      (valueChange)="update('city', $event)"
    />

    <div class="my-profile__row">
      <tar-text-field
        label="Timezone"
        testId="profile-timezone"
        [value]="form().timezone"
        (valueChange)="update('timezone', $event)"
      />
      <tar-text-field
        label="Locale"
        testId="profile-locale"
        [value]="form().locale"
        (valueChange)="update('locale', $event)"
      />
    </div>

    <tar-form-actions
      saveLabel="Save changes"
      cancelLabel="Cancel"
      saveTestId="profile-save"
      cancelTestId="profile-cancel"
      [dirty]="isDirty()"
      (saved)="onSave()"
      (cancelled)="onCancel()"
    />
  </form>

  <app-sessions-card />
</section>
