<section data-testid="sessions-card" class="sessions-card">
  <header class="sessions-card__header">
    <h2 class="sessions-card__title">Active sessions</h2>
    @if (hasOthers()) {
      <tar-button
        testId="sessions-sign-out-others"
        variant="outlined"
        (clicked)="onSignOutOthers()"
      >
        Sign out other sessions
      </tar-button>
    }
  </header>
  <ul class="sessions-card__list">
    @for (s of sessions(); track s.id) {
      <li [attr.data-testid]="'session-row-' + s.id" class="sessions-card__row">
        <div>
          <strong>{{ s.device }}</strong>
          @if (s.current) {
            <span class="sessions-card__chip">This device</span>
          }
        </div>
        <small class="sessions-card__meta">
          {{ s.location }} · last seen {{ s.lastSeen }}
        </small>
      </li>
    }
  </ul>
</section>
