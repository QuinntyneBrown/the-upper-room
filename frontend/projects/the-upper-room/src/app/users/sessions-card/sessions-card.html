<section data-testid="sessions-card" class="card">
  <header class="card__header">
    <h2>Active sessions</h2>
    @if (hasOthers()) {
      <button
        data-testid="sessions-sign-out-others"
        type="button"
        class="btn btn--ghost"
        (click)="onSignOutOthers()"
      >
        Sign out other sessions
      </button>
    }
  </header>
  <ul class="list">
    @for (s of sessions(); track s.id) {
      <li [attr.data-testid]="'session-row-' + s.id" class="row">
        <div>
          <strong>{{ s.device }}</strong>
          @if (s.current) {
            <span class="chip">This device</span>
          }
        </div>
        <small>{{ s.location }} · last seen {{ s.lastSeen }}</small>
      </li>
    }
  </ul>
</section>
